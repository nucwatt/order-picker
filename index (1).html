<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発表順決定ツール | nucwatt</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --peach:        #f9ece6;
    --peach-mid:    #f0cfc2;
    --peach-accent: #e8906e;
    --sky:          #e8f2fb;
    --sky-mid:      #b8d8f0;
    --mint:         #e6f4f0;
    --ink:          #333333;
    --muted:        #888888;
    --border:       #ebebeb;
    --bg:           #fafafa;
    --white:        #ffffff;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-weight: 400;
  }

  /* ── Header ── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 2.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    text-decoration: none;
  }

  .header-divider {
    width: 1px; height: 22px;
    background: var(--border);
  }
  .header-subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  /* ── Page title bar ── */
  .title-bar {
    background: var(--white);
    padding: 1.8rem 2.5rem 1.4rem;
    border-bottom: 1px solid var(--border);
  }
  .title-bar h1 {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.04em;
  }

  /* ── Main layout ── */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.4rem;
    align-items: start;
  }
  @media (max-width: 680px) {
    .main { grid-template-columns: 1fr; padding: 1.2rem 1rem; }
    .title-bar { padding: 1.6rem 1.2rem 1.4rem; }
    header { padding: 0.8rem 1.2rem; }
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.6rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.3rem;
    padding-bottom: 0.9rem;
    border-bottom: 1px solid var(--border);
  }
  .step-badge {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--peach-accent);
    color: var(--white);
    font-size: 0.68rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-title-text {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
  }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--peach-mid);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    background: var(--peach);
    transition: all 0.2s;
    margin-bottom: 0.9rem;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--peach-accent);
    background: #fce5dc;
  }
  .upload-zone input { display: none; }
  .upload-icon-wrap {
    width: 40px; height: 40px;
    background: var(--peach-accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 0.7rem;
  }
  .upload-icon-wrap svg { width: 18px; height: 18px; }
  .upload-zone p { font-size: 0.8rem; color: var(--ink); line-height: 1.7; }
  .upload-zone p strong { color: var(--peach-accent); font-weight: 700; }
  .upload-zone p small { color: #b08070; font-size: 0.72rem; }

  .or-divider {
    display: flex; align-items: center; gap: 0.7rem;
    font-size: 0.72rem; color: var(--muted);
    letter-spacing: 0.1em; margin: 0.8rem 0;
  }
  .or-divider::before, .or-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── Textarea ── */
  textarea {
    width: 100%; height: 160px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 0.95rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.875rem;
    color: var(--ink);
    background: var(--bg);
    resize: vertical; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.8;
  }
  textarea:focus {
    border-color: var(--peach-accent);
    box-shadow: 0 0 0 3px rgba(232,144,110,0.12);
    background: var(--white);
  }
  textarea::placeholder { color: #c4bab6; }

  .hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.5rem; line-height: 1.7; }

  /* ── Count chip ── */
  .count-row { margin-top: 0.8rem; }
  .count-chip {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.76rem; color: var(--muted);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.22rem 0.75rem;
    transition: all 0.2s;
  }
  .count-chip.active {
    color: var(--peach-accent);
    border-color: var(--peach-mid);
    background: var(--peach);
  }
  .count-chip .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--peach-accent); display: none;
  }
  .count-chip.active .dot { display: block; }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%; padding: 0.9rem;
    background: var(--peach-accent); color: var(--white);
    border: none; border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.06em; cursor: pointer;
    margin-top: 1.1rem;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(232,144,110,0.3);
  }
  .btn-primary:hover:not(:disabled) {
    background: #d9724e;
    box-shadow: 0 6px 18px rgba(232,144,110,0.4);
  }
  .btn-primary:active:not(:disabled) { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .btn-secondary {
    width: 100%; padding: 0.65rem;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem;
    cursor: pointer; margin-top: 0.5rem; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: #aaa; color: var(--ink); }

  /* ── Error ── */
  .error-msg {
    font-size: 0.74rem; color: #d95f3b; margin-top: 0.4rem;
    display: none; align-items: center; gap: 0.3rem;
  }
  .error-msg.show { display: flex; }

  /* ── Result empty ── */
  .result-empty { text-align: center; padding: 2.5rem 1rem; }
  .empty-illus {
    width: 68px; height: 68px;
    background: var(--sky);
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .empty-illus svg { width: 30px; height: 30px; }
  .result-empty p { font-size: 0.82rem; color: var(--muted); line-height: 2.1; font-weight: 300; }

  /* ── Result content ── */
  #resultContent { display: none; }
  .result-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.1rem;
  }
  .result-top-title { font-size: 0.9rem; font-weight: 700; color: var(--ink); }
  .result-count-tag {
    font-size: 0.72rem; color: #6699bb;
    background: var(--sky); border: 1px solid var(--sky-mid);
    border-radius: 20px; padding: 0.18rem 0.7rem;
  }

  .result-list { list-style: none; }
  .result-list li {
    display: flex; align-items: center; gap: 0.85rem;
    padding: 0.6rem 0.3rem; border-radius: 8px;
    animation: fadeUp 0.3s ease both;
    transition: background 0.15s;
  }
  .result-list li:hover { background: var(--bg); }
  .separator { height: 1px; background: var(--border); margin: 0 0.3rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .order-circle {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--sky); border: 1.5px solid var(--sky-mid);
    color: #5588aa; font-size: 0.75rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .order-circle.first {
    background: var(--peach-accent); border-color: var(--peach-accent);
    color: var(--white);
    box-shadow: 0 3px 10px rgba(232,144,110,0.35);
  }

  .name-main { font-size: 0.9rem; font-weight: 500; color: var(--ink); }
  .first-tag {
    font-size: 0.64rem; letter-spacing: 0.1em;
    color: var(--peach-accent); font-weight: 700; margin-left: 0.5rem;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: #444; color: var(--white);
    padding: 0.6rem 1.4rem; border-radius: 8px;
    font-size: 0.78rem; opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 100; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.15);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Footer ── */
  footer {
    text-align: center; padding: 2rem;
    font-size: 0.7rem; color: #bbb;
    border-top: 1px solid var(--border); margin-top: 1rem;
  }
</style>
</head>

      <div class="upload-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M8 12l4-4 4 4M12 8v8"/>
        </svg>
      </div>
      <p><strong>Excelファイルをここにドロップ</strong><br>またはクリックしてファイルを選択<br><small>.xlsx / .xls / .csv 対応</small></p>
    </div>
    <p class="error-msg" id="fileError">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      ファイルの読み込みに失敗しました。形式を確認してください。
    </p>

    <div class="or-divider">または手入力</div>

    <textarea id="nameInput" placeholder="名前を1行に1人ずつ入力してください&#10;例）&#10;田中 太郎&#10;佐藤 花子&#10;鈴木 一郎"></textarea>
    <p class="hint">・1行に1名、最大100名まで対応<br>・ExcelはA列1行目から名前が並んでいるファイルをご使用ください</p>

    <div class="count-row">
      <div class="count-chip" id="countChip">
        <span class="dot"></span>
        <span id="countText">入力待ち</span>
      </div>
    </div>

    <button class="btn-primary" id="shuffleBtn" disabled>順番を決定する</button>
    <button class="btn-secondary" id="clearBtn">リセット</button>
  </div>

  <!-- Result -->
  <div class="card">
    <div id="resultEmpty" class="result-empty">
      <div class="empty-illus">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6699bb" stroke-width="1.5" stroke-linecap="round">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
      </div>
      <p>参加者を入力して<br>「順番を決定する」を<br>押してください</p>
    </div>

    <div id="resultContent">
      <div class="result-top">
        <span class="result-top-title">発表順</span>
        <span class="result-count-tag" id="resultMeta"></span>
      </div>
      <ul class="result-list" id="resultList"></ul>
    </div>
  </div>

</div>

<footer>© nucwatt, Inc. All Rights Reserved.</footer>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  const nameInput     = document.getElementById('nameInput');
  const shuffleBtn    = document.getElementById('shuffleBtn');
  const clearBtn      = document.getElementById('clearBtn');
  const countChip     = document.getElementById('countChip');
  const countText     = document.getElementById('countText');
  const resultEmpty   = document.getElementById('resultEmpty');
  const resultContent = document.getElementById('resultContent');
  const resultList    = document.getElementById('resultList');
  const resultMeta    = document.getElementById('resultMeta');
  const uploadZone    = document.getElementById('uploadZone');
  const fileInput     = document.getElementById('fileInput');
  const fileError     = document.getElementById('fileError');
  const toast         = document.getElementById('toast');

  function getNames() {
    return nameInput.value.split('\n').map(n => n.trim()).filter(n => n).slice(0, 100);
  }

  function updateCount() {
    const n = getNames().length;
    if (n === 0) {
      countText.textContent = '入力待ち';
      countChip.classList.remove('active');
      shuffleBtn.disabled = true;
    } else {
      countText.textContent = n + ' 名 入力済み';
      countChip.classList.add('active');
      shuffleBtn.disabled = n < 2;
    }
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2400);
  }

  nameInput.addEventListener('input', updateCount);

  shuffleBtn.addEventListener('click', () => {
    const names = getNames();
    if (names.length < 2) return;
    const shuffled = shuffle(names);

    resultEmpty.style.display = 'none';
    resultContent.style.display = 'block';
    resultMeta.textContent = '全 ' + shuffled.length + ' 名';
    resultList.innerHTML = '';

    shuffled.forEach((name, i) => {
      if (i > 0) {
        const sep = document.createElement('div');
        sep.className = 'separator';
        resultList.appendChild(sep);
      }
      const li = document.createElement('li');
      li.style.animationDelay = (i * 25) + 'ms';
      li.innerHTML =
        '<span class="order-circle' + (i === 0 ? ' first' : '') + '">' + (i + 1) + '</span>' +
        '<span class="name-main">' + esc(name) + (i === 0 ? '<span class="first-tag">TOP</span>' : '') + '</span>';
      resultList.appendChild(li);
    });

    showToast('✓ 発表順を決定しました');
  });

  clearBtn.addEventListener('click', () => {
    nameInput.value = '';
    updateCount();
    resultEmpty.style.display = 'block';
    resultContent.style.display = 'none';
    fileError.classList.remove('show');
  });

  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) readFile(e.target.files[0]);
    fileInput.value = '';
  });

  function readFile(file) {
    fileError.classList.remove('show');
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'csv') {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const names = e.target.result.split(/\r?\n/)
            .map(l => l.split(',')[0].trim().replace(/^"|"$/g, '')).filter(n => n);
          applyNames(names, file.name);
        } catch(e) { fileError.classList.add('show'); }
      };
      reader.readAsText(file, 'UTF-8');
    } else if (ext === 'xlsx' || ext === 'xls') {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
          const names = data.map(r => (r[0] || '').toString().trim()).filter(n => n);
          applyNames(names, file.name);
        } catch(e) { fileError.classList.add('show'); }
      };
      reader.readAsArrayBuffer(file);
    } else {
      fileError.classList.add('show');
    }
  }

  function applyNames(names, filename) {
    if (!names.length) { fileError.classList.add('show'); return; }
    const limited = names.slice(0, 100);
    nameInput.value = limited.join('\n');
    updateCount();
    showToast(filename + ' から ' + limited.length + ' 名を読み込みました');
  }
</script>
</body>
</html>
